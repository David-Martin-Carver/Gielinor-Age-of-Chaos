l_english:
 game_concept_grevetica:0 "Grevetica"
 game_concept_grevetica_desc:0 "Grevetica is not simply revered as a prophet, but worshipped as a deity — one who embodies both compassion and rebellion. Her followers believe that by [Concept('path_of_emulation','emulating')|E] her acts of defiance, wisdom, and mercy, they too may ascend beyond mortal limitations."
 