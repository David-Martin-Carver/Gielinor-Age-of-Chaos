 game_concept_the_great_parting:0 "The Great Parting of Barathia"
 game_concept_the_great_parting_desc:0 "The collapse of the Barathian Empire left a patchwork of successor states across [arbundia|E], each clinging to legitimacy. While some claim divine right through [Concept('grevetican_doctrine','Grevetican doctrine')|E], others assert their rule through military force, commerce, or ancestral claim."
 