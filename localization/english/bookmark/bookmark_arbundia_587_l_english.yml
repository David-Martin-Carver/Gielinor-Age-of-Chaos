 bm_group_587:0 "The Shattered Realms"
 bm_587_arbundia:0 "Shattered Realms"
 bm_587_arbundia_desc:0 "The lands of Arbundia have descended into chaos. Vyadan Lords struggle to find a leader to stave off the raids of the Castigonians from Grevetica's Crossing. Errolingian Errans have lost their grip on their former vassals, leading to lesser Lords looking to usurp the former Errolingian Errandom. Finally the Southern Realms have begun to unite with eyes turning to the leaderless Arbundian lands. Can faith in Grevetica alone save Her people, what will the fate of Arbundia be?"


 #Jarl Haesteinn
 bookmark_penloran_arbaes:0 "Arbaes Penloring"
 bookmark_penloran_arbaes_desc:0 "The Magrancy of Penloran has been on somewhat of an ascendancy as of late. Though her mother Sarwen died young, she laid the groundwork for the rise of Penloran against their former masters in the crumbling Errolingian Errandom. Now Arbaes has reached her majority, where will her diligent education take her? Can she take her realm to greatness and unite the Arbundians, or is her line doomed to obscurity?"
 bookmark_errolingia_ablund:0 "Ablund Erroling"
 bookmark_errolingia_ablund_desc:0 "A man with an eye for the ledgers, the Petty Erran was born too late to save his Father's crumbling Errandom. With a stubborn mind and a generous hand, what few vassals Ablund has left are unsure if he can stay the course and return the realm to greatness, or if he will give what little he has left away to nothing. Can you guide the Errolings back to their former glory, or are they to be forgotten?"
 bookmark_errolingia_teruth:0 "Teruth Erroling"
 bookmark_errolingia_teruth_desc:0 "While his elder brother honed his skills in administration, Anglen Teruth put his hands to more practical matters. Convinced that a strong sword arm is all it takes to make a realm, Teruth believes he can put the pieces of Errolingia back together with a glue made of marrow and blood. Can you guide Teruth's hands to a future of conquest, or is he doomed to be no more than a belligerent aggressor?"
 bookmark_bluewoods_barolt:0 "Barolt Bleuris"
 bookmark_bluewoods_barolt_desc:0 "The second son of a would be conqueror, Barolt and Barolt alone was the only son capable of holding what little remains of his Father's legacy. A man of great ambition, Barolt has his eyes set on his former lands in the Magrancy of Gorath. Will this second son be given his second chance to regain his upstart Father's land and bring the Bleuris name to greatness?"
 bookmark_glitterbrook_hertia:0 "Hertia Heurwald"
 bookmark_glitterbrook_hertia_desc:0 "Daughter of a foolish adventurer, Hertia has fought valiantly to maintain a foothold in foreign lands, but the men who killed her Father surround her Petty Errandom.\n\n#bold Can you wrestle back control our your Father's former conquests and bring the Heurwald name to greatness?#!"

