 veyr_religion_desc:0 "Long before the Grevetican Prophet walked the land, the city of Aven’karth traded in coin, prophecy, and the language of stars. Its people spoke to the sea and recorded its answers in salt-crystals and pearl-scribes. One day, without war or warning, the entire city was swallowed by the waves — not in punishment, but in return.\n\nVeyr'Mirism holds that Aven’karth was never meant to exist on land. It was a sacred wound in the world — a threshold between the seen and unseen, the spoken and the drowned.

 
