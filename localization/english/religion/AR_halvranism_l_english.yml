 halvranism_religion_desc:0 "An ancient faith born in the shrouded northern highlands of Arbundia. Halvranism exalts strength, glory in battle, and absolute loyalty to one’s clan. The faithful honor Halvern, the eternal warfather, who commands the honored dead in the Hall of Howls. Through conquest, storm rituals, and ritual sacrifice before old age, Halvrans seek favor in both life and death. With the sea as his voice and the mountains his crown, Halvern stirs once more."

