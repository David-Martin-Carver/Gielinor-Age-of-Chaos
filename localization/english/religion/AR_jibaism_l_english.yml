jibaism_religion_desc:0 "Jibaism arose among cast-out laborers, broken families, and wandering artisans in the aftermath of the Barathian collapse and the Great Parting. Its followers trace their spiritual lineage not to emperors or prophets, but to Jiba, the Clay-King, a sorrowful and wandering figure who shaped people from ash and earth after the First Cities fell. Wherever the broken fled, Jiba was said to walk ahead of them, barefoot, molding the world as he went."

