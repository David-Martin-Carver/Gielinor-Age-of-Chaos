 corvan_religion_desc:0 "An ancient faith forged in the crucible of tribal life. Corvanism exalts strength, conquest, and the ancestral spirits. Adherents believe the greatest honor is a glorious death in battle, securing a place alongside Halvern in the eternal war against the forces of chaos. Ritual suicide is seen as a final offering of devotion, ensuring the continued prosperity of the tribe."
 
