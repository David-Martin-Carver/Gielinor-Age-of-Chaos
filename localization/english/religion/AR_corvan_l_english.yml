 corvanism_religion_desc:0 "Corvanism is a religion forged in blood and iron. It exalts tribal strength, the glory of warfare, and the potent spirits inhabiting the land. Its traditions assert that the strong shall govern, and the weak shall yield. Corvanists perceive Graveticans and Luminarians as threats, their foreign creeds a corrosive influence that must be purged from their shores, driven back into the sea from which they emerged millennia ago. A valiant death in battle or a voluntary ritual sacrifice is considered the ultimate honor, ensuring prosperity for future generations. Witchcraft permeates daily life, binding the wise to the unseen forces that shape destiny."
