 azakuism:0 "Azakiak"
 azakuism_desc:0 "Azakiak is the faith native to the Thekari, followers of Azkaran, he who is divided. Azkaran's mind is divided into three aspects: the Stonewarden, whom represents steadfastness, stubbornness and resilience, whose worshippers are defiant and determined people; the Gentle Current, whom represents patience and humility, whose followers are known as wise stewards, and ascetic monks; and The Seer, whom represents care, nurture and guidance, and whose followers are known for their guardianship of the young. Each aspect and Azkaran as a whole also hold an opposite malovelant counterpart in the form of Karazan. Due to the divided nature of the faith, there exists no single head of it, but rather a series of disunified wisemen and women known as the Hangai that act as the faith’s preachers and guides, with some even preaching of the lesser aspects of Azkaran, such as the water nymphs and elementals."
