l_english:
 tenet_zalkot_seers_desc:0 "Chosen clergy members of this faith ingest lethal doses of liquid mixed with Zalkot powder which acts as a powerful hallucinogenic in ritualistic suicides. The words spoken by the recipient before their death is chronicled as prophecy with its importance often determined by the station or notoriety of the clergy or if a prophecy has been commonly repeated in several instances"
 tenet_zalkot_seers_name:0 "Zalkot Seers"

