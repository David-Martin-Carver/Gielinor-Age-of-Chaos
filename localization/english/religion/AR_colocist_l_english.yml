protestantism_desc:0 "A collection of diverse faiths stemming from Luminarianism, these sects reject the centralized authority of the High Seer. Instead, each realm interprets the Scrolls of Revelation according to local customs and needs, resulting in a wide array of beliefs and practices. While they share a common origin, these sects often differ in their doctrines and rituals, while still respecting each other's creed and independence, reflecting the unique cultural landscapes they inhabit."
