 grevetican_religion_desc:0 "Emerging from the Great Parting of Barathia, Greveticanism is a faith centered on the divine miracles of Grevetica, a prophet turned deity whose transcendence defied the rigid dogma of the old order. Its adherents believe that through devotion and emulation of Grevetica’s acts of compassion and defiance, they can ascend beyond mortal limitations. Rejected by adherents of the old ways, Her followers have finally broken free from their former tyrant masters of the Corvanists."

