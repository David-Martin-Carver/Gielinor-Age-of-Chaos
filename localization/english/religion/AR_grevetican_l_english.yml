 greveticanism_religion_desc:0 "Greveticanism exalts the divine legacy of [grevetica|E], the rebellious prophet who ascended beyond mortality, [Concept('grevetican_defiance','defying')|E] the northern raiders that sought to destroy Her new home. Her miracles serve as a guide for her followers, who strive to [Concept('path_of_emulation','emulate')|E] her wisdom and compassion. Greveticans believe that only by embracing Grevetica’s revelations can one attain true enlightenment and salvation."
