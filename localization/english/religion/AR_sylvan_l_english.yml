sylvan_heart_religion_desc:0 "Sylvanism is a deep and abiding kinship with the natural world. Its followers are bound to the spirits of the forest. This reverence for nature extends to a profound respect for their ancestors and their families, who are seen as extensions of the land itself. Their connection to the land becomes a source of unparalleled strength, fueling a ferocious defense against any perceived intrusion, to protect their way of life."

