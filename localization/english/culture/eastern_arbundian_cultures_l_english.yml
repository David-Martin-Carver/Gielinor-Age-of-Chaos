l_english:
  luthani:0 "Luthan"
  luthani_prefix:0 "Luthani"
  luthani_collective_noun:0 "Luthani"
  luthani_desc:0 "Rooted in the salt-worn ports and sea-wind courts of eastern Arbundia, the Luthani are a bold, sharp-tongued people who prize cunning, trade, and the thrill of conflict. Life is performance, law is blade-bound, and respect is earned on dueling sands as much as in merchant halls. Their mercantile fleets roam far, carrying wit, wealth, and war in equal measure."

  dunilain:0 "Dunilain"
  dunilain_prefix:0 "Dunilain"
  dunilain_collective_noun:0 "Dunilains"
  dunilain_desc:0 "Emerging from forested estates and river-crossed courts, the Dunilain are refined traditionalists whose devotion to faith and order defines every facet of life. Guided by intricate codes of honor, divine bureaucracy, and falconry rites, they blend chivalric discipline with sacred formality, seeing every act as service to the divine structure of the world."

